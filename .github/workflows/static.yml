name: Deploy UAT to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-uat
  cancel-in-progress: false

jobs:
  test-and-build:
    name: Test and build UAT
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

      - name: Run public release content gate
        run: npm run validate:content:release

      - name: Build UAT application
        run: npm run build:uat

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: content-provenance-release-evidence
          path: dist/release-evidence/content-provenance-evidence.json
          if-no-files-found: error
          retention-days: 90

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/ironsworn/browser

  deploy:
    name: Deploy UAT Pages
    needs: test-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

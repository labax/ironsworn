name: One-time non-main branch cleanup

# Triggered once to remove all branches except main.
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-non-main-branches.yml

permissions:
  contents: write

jobs:
  delete-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Delete every branch except main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -u

          mapfile -t branches < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/branches?per_page=100" --jq '.[].name'
          )

          failures=()

          for branch in "${branches[@]}"; do
            if [[ "$branch" == "main" ]]; then
              echo "Keeping main"
              continue
            fi

            echo "Deleting branch: $branch"
            if ! gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/$branch"; then
              failures+=("$branch")
            fi
          done

          if (( ${#failures[@]} > 0 )); then
            printf 'Failed to delete: %s\n' "${failures[@]}" >&2
            exit 1
          fi

          echo "Branch cleanup completed."

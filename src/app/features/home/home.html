<section class="hero" aria-labelledby="home-title">
  <p class="kicker">Companion dashboard</p>
  <h2 id="home-title">Plan, track, and review your campaign workspace.</h2>
  <p>
    This shell provides stable navigation for future gameplay tools while licensed content and
    domain features are prepared in separate work.
  </p>

  <dl class="status-list" aria-label="Workspace status">
    <div>
      <dt>Workspace</dt>
      <dd>{{ workspace.workspaceName() }}</dd>
    </div>
    <div>
      <dt>Mode</dt>
      <dd>{{ workspace.mode() }}</dd>
    </div>
  </dl>
</section>

<nav class="app-navigation" aria-label="Primary navigation">
  <ul>
    @for (item of items; track item.path) {
      <li>
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.exact }"
          ariaCurrentWhenActive="page"
        >
          {{ item.label }}
        </a>
      </li>
    }
  </ul>
</nav>
